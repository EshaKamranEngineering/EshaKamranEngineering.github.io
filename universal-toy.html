<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Universal Design Toy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0d0d0d;
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .hero video {
      width: 100%;
      border-radius: 16px;
      margin-bottom: 30px;
      display: block;
    }

    .section {
      margin-bottom: 50px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .grid img {
      width: 100%;
      border-radius: 12px;
    }

    p {
      color: #bbb;
      line-height: 1.6;
      font-size: 18px;
    }

    /* PDF viewer */
    .pdf-container {
      margin-top: 30px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }

    iframe {
      width: 100%;
      height: 800px;
      border: none;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }

      iframe {
        height: 500px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Universal Design Toy</h1>

    <!-- VIDEO -->
    <div class="hero">
      <video autoplay loop muted playsinline controls>
        <source src="toy-car.mp4" type="video/mp4">
      </video>
    </div>

    <!-- DESCRIPTION -->
    <div class="section">
      <p>
        A modular toy car designed for kids ages 3–9 with interchangeable parts,
        rolling wheels, and a simple, intuitive design.
      </p>
    </div>

    <!-- IMAGES -->
    <div class="section grid">
      <img src="toy-car-render.jpg">
      <img src="toy-car-drawing3.jpg">
    </div>

    <div class="section grid">
      <img src="toy-car-drawing2.png">
      <img src="toy-car-drawing1.jpg">
    </div>

    <!-- 🔥 EMBEDDED PDF -->
    <div class="section">
      <h2 style="margin-bottom: 15px;">Full Report</h2>

      <div class="pdf-container">
        <iframe src="Team4_SnapSpeedCar_FinalReport.pdf"></iframe>
      </div>
    </div>

  </div>

</body>
</html>
