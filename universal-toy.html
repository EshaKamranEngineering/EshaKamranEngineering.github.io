<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Universal Design Toy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0d0d0d;
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .hero img {
      width: 100%;
      border-radius: 16px;
      margin-bottom: 30px;
    }

    .section {
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .grid img {
      width: 100%;
      border-radius: 12px;
    }

    p {
      color: #bbb;
      line-height: 1.6;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Universal Design Toy</h1>

    <!-- 🔥 HERO GIF -->
    <div class="hero">
      <img src="toy-car.gif" alt="Toy Car Demo">
    </div>

    <!-- SHORT DESCRIPTION -->
    <div class="section">
      <p>
        A modular toy car designed for kids ages 3–9 with interchangeable parts,
        rolling wheels, and a simple, intuitive design.
      </p>
    </div>

    <!-- CAD + DESIGN -->
    <div class="section grid">
      <img src="toy-car-render.jpg">
      <img src="toy-car-drawing3.jpg">
    </div>

    <!-- MORE DETAILS -->
    <div class="section grid">
      <img src="toy-car-drawing2.png">
      <img src="toy-car-drawing1.jpg">
    </div>

  </div>

</body>
</html>
